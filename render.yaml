services:
  - type: web
    name: citrus-disease-detector
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --threads 4 --timeout 120 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: DEFAULT_CITY
        value: Chhatrapati Sambhajinagar
      - key: PYTHON_VERSION
        value: 3.11.9
